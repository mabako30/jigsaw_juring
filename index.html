<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juring Puzzle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0ede8;--surface:#ffffff;--surface2:#f7f5f2;
  --border:#e0dbd4;--border2:#ccc8c0;
  --text:#1a1a1a;--text2:#6b6560;--text3:#a09890;
  --accent:#4a7cdc;--accent-bg:#eef3fd;
  --sidebar:220px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── 툴바 ── */
#toolbar{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:48px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#toolbar h1{font-size:15px;font-weight:700;color:var(--text);margin-right:8px;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.tb-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:12px;font-family:inherit;
  cursor:pointer;transition:all .15s;white-space:nowrap
}
.tb-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.tb-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* 진행률 */
#prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
#prog-bar-bg{width:120px;height:6px;border-radius:3px;background:var(--border);overflow:hidden}
#prog-bar{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
#prog-text{font-size:12px;color:var(--text2);min-width:32px}
#timer-val{font-size:13px;font-weight:500;color:var(--text);min-width:36px;text-align:right}

/* 바탕색 팔레트 드롭다운 */
#color-picker-wrap{position:relative}
#color-dropdown{
  display:none;position:absolute;top:calc(100% + 6px);left:0;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px;z-index:200;width:200px;box-shadow:0 4px 20px rgba(0,0,0,.12)
}
#color-dropdown.open{display:block}
#color-dropdown h3{font-size:11px;color:var(--text3);margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase}
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.swatch{
  width:26px;height:26px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:transform .15s;
}
.swatch:hover{transform:scale(1.15)}
.swatch.selected{border-color:var(--accent);box-shadow:0 0 0 2px white,0 0 0 4px var(--accent)}
.custom-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.custom-row label{font-size:11px;color:var(--text2)}
#custom-color{width:36px;height:28px;border:1px solid var(--border);border-radius:5px;cursor:pointer;padding:1px}

/* ── 메인 레이아웃 ── */
#app{display:flex;flex:1;overflow:hidden}

/* ── 사이드바 ── */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-section{padding:12px}
.sb-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
#piece-count-badge{
  display:inline-block;background:var(--accent-bg);color:var(--accent);
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px
}
#tray{
  flex:1;overflow-y:auto;padding:8px 10px;
  display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start
}
#tray::-webkit-scrollbar{width:3px}
#tray::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.tp{cursor:pointer;border-radius:3px;border:1.5px solid var(--border);transition:all .15s;display:block}
.tp:hover{border-color:var(--accent);transform:scale(1.08);z-index:10;position:relative}
.tp.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}

/* 힌트 이미지 */
.sb-hint{padding:0 10px 12px}
#hint-img{width:100%;border-radius:6px;border:1px solid var(--border);opacity:.7;cursor:pointer;transition:opacity .2s}
#hint-img:hover{opacity:1}
#hint-wrap{display:none}

/* ── 보드 영역 ── */
#board-area{
  flex:1;display:flex;flex-direction:column;overflow:hidden
}
#board-scroll{
  flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;
  padding:24px;transition:background .3s
}
#board-wrap{position:relative;flex-shrink:0}
#boardCv{display:block;border-radius:4px;box-shadow:0 2px 16px rgba(0,0,0,.1)}

/* ── 하단 스탯 바 ── */
#statbar{
  height:52px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:0;flex-shrink:0
}
.stat-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 28px;border-right:1px solid var(--border)
}
.stat-item:last-child{border-right:none}
.stat-v{font-size:18px;font-weight:700;color:var(--text);line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.04em}
.stat-item .stat-v.accent{color:var(--accent)}

/* ── 완성 오버레이 ── */
#overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:300;align-items:center;justify-content:center
}
#overlay.on{display:flex}
#overlay-box{
  background:var(--surface);border-radius:16px;padding:32px 40px;
  text-align:center;max-width:360px;width:90%;
  box-shadow:0 8px 40px rgba(0,0,0,.2)
}
#overlay-box h2{font-size:1.8rem;margin-bottom:8px}
#overlay-box p{color:var(--text2);font-size:14px;margin-bottom:20px}
.ov-stats{display:flex;gap:24px;justify-content:center;margin-bottom:24px}
.ov-stat{text-align:center}
.ov-stat-v{font-size:22px;font-weight:700;color:var(--accent)}
.ov-stat-l{font-size:11px;color:var(--text3)}
.ov-btns{display:flex;gap:10px;justify-content:center}
.ov-btn-primary{padding:10px 24px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.ov-btn-sec{padding:10px 20px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:inherit;font-size:14px;cursor:pointer}
.ov-btn-sec:hover{background:var(--surface2)}

/* ── 메인 화면 ── */
#main-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:20px;padding:32px
}
#main-screen img{width:min(420px,80vw);border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.08)}
#main-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:24px 28px;width:min(420px,80vw)}
#main-card h2{font-size:15px;font-weight:700;margin-bottom:16px}
.info-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:8px}
.info-row span{font-weight:500;color:var(--text)}
#main-start{width:100%;margin-top:16px;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
#main-start:hover{opacity:.9}
#file-input{font-size:12px;font-family:inherit;color:var(--text2);max-width:180px}
#file-input::file-selector-button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:12px;cursor:pointer}
#file-input::file-selector-button:hover{background:var(--border)}
#grid-select{padding:2px 6px;border-radius:5px;border:1px solid var(--border);font-family:inherit;font-size:12px;color:var(--text);background:var(--surface);cursor:pointer}
.img-opt{cursor:pointer;font-size:12px;margin-right:8px}
.img-opt input{cursor:pointer;vertical-align:middle}
</style>
</head>
<body>

<!-- 툴바 -->
<div id="toolbar">
  <h1>🧩 Juring Puzzle</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-new">↺ 새 게임</button>
  <button class="tb-btn" id="btn-hint">👁 힌트</button>
  <button class="tb-btn" id="btn-cheat" style="color:#c0507a;border-color:#e8b4c8">⚡ 치트키</button>
  <div class="tb-sep"></div>

  <!-- 바탕색 선택 -->
  <div id="color-picker-wrap">
    <button class="tb-btn" id="btn-color">🎨 바탕색</button>
    <div id="color-dropdown">
      <h3>바탕색 선택</h3>
      <div class="color-swatches" id="swatches"></div>
      <div class="custom-row">
        <label>직접 선택</label>
        <input type="color" id="custom-color" value="#f0ede8">
      </div>
    </div>
  </div>

  <div id="prog-wrap">
    <div id="prog-bar-bg"><div id="prog-bar" style="width:0%"></div></div>
    <span id="prog-text">0%</span>
    <div class="tb-sep"></div>
    <span id="timer-val">0:00</span>
  </div>
</div>

<!-- 앱 바디 -->
<div id="app" style="display:none">
  <!-- 사이드바 -->
  <div id="sidebar">
    <div class="sb-section" style="border-bottom:1px solid var(--border);padding-bottom:10px">
      <div class="sb-label">남은 조각<span id="piece-count-badge">64</span></div>
    </div>
    <div id="tray"></div>
    <div class="sb-hint" id="hint-wrap">
      <div class="sb-label" style="padding:0 0 6px 0">힌트</div>
            <img id="hint-img" src="">
    </div>
  </div>

  <!-- 보드 -->
  <div id="board-area">
    <div id="board-scroll">
      <div id="board-wrap">
        <canvas id="boardCv" style="background:#ffffff"></canvas>
      </div>
    </div>

    <!-- 스탯바 -->
    <div id="statbar">
      <div class="stat-item"><div class="stat-v" id="s-move">0</div><div class="stat-l">이동 횟수</div></div>
      <div class="stat-item"><div class="stat-v" id="s-time">0:00</div><div class="stat-l">경과 시간</div></div>
      <div class="stat-item"><div class="stat-v accent" id="s-pct">0%</div><div class="stat-l">완성률</div></div>
      <div class="stat-item"><div class="stat-v" id="s-rem">64</div><div class="stat-l">남은 조각</div></div>
    </div>
  </div>
</div>

<!-- 메인 화면 -->
<div id="main-screen">
  <img id="main-image" src="">
  <div id="main-card">
    <h2>게임 설정</h2>
    <div class="info-row">이미지
      <span>
        <label class="img-opt"><input type="radio" name="img" value="0" checked> 이미지 1</label>
        <label class="img-opt"><input type="radio" name="img" value="1"> 이미지 2</label>
      </span>
    </div>
    <div class="info-row">조각 수
      <span>
        <select id="grid-select">
          <option value="8,8,64">64개 (8×8)</option>
          <option value="16,8,128">128개 (16×8)</option>
        </select>
      </span>
    </div>
    <div class="info-row">조작법 <span>조각 클릭 → 보드 클릭 배치</span></div>
    <div class="info-row">보드 위 조각 클릭 <span>→ 트레이 반환</span></div>
    <button id="main-start">시작하기 ✨</button>
  </div>
</div>

<!-- 완성 오버레이 -->
<div id="overlay">
  <div id="overlay-box">
    <h2 id="overlay-title">🎉 완성!</h2>
    <p id="overlay-desc">퍼즐을 완성했어요!</p>
    <div class="ov-stats">
      <div class="ov-stat"><div class="ov-stat-v" id="ov-moves">-</div><div class="ov-stat-l">이동 횟수</div></div>
      <div class="ov-stat"><div class="ov-stat-v" id="ov-time">-</div><div class="ov-stat-l">완료 시간</div></div>
    </div>
    <div class="ov-btns">
      <button class="ov-btn-primary" id="ov-replay">다시 하기</button>
      <button class="ov-btn-sec" id="ov-menu">메뉴로</button>
    </div>
  </div>
</div>

<script>
let COLS=8, ROWS=8, TOTAL=64, TAB=0.28;
const IMG_LIST=['image1.png','image2.png'];
let selectedImgIdx=0;
let gImg=null, pw=0, ph=0, bw=0, bh=0;
let board=[], pieces=[], sel=null, moves=0, t0=null, ti=null;
let pieceCache={};

/* ── 바탕색 팔레트 ── */
const PRESETS=[
  {c:'#f0ede8',n:'크림'},
  {c:'#1a1a2e',n:'다크 네이비'},
  {c:'#0d1117',n:'다크'},
  {c:'#2d1b33',n:'퍼플 다크'},
  {c:'#1a2e1a',n:'포레스트'},
  {c:'#2e1a1a',n:'다크 레드'},
  {c:'#e8f0fe',n:'라이트 블루'},
  {c:'#fce4ec',n:'라이트 핑크'},
  {c:'#e8f5e9',n:'라이트 그린'},
  {c:'#fff8e1',n:'라이트 옐로'},
  {c:'#f3e5f5',n:'라이트 퍼플'},
  {c:'#ffffff',n:'화이트'},
];

const swatchWrap = document.getElementById('swatches');
let currentBg = '#f0ede8';

function applyBg(color) {
  currentBg = color;
  document.getElementById('board-scroll').style.background = color;
  document.getElementById('custom-color').value = color;
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === color);
  });
}

PRESETS.forEach(({c,n}) => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = c;
  s.dataset.color = c;
  s.title = n;
  s.addEventListener('click', () => { applyBg(c); });
  swatchWrap.appendChild(s);
});
applyBg('#f0ede8');

document.getElementById('custom-color').addEventListener('input', e => applyBg(e.target.value));

// 드롭다운 토글
document.getElementById('btn-color').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('color-dropdown').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('color-dropdown').classList.remove('open'));
document.getElementById('color-dropdown').addEventListener('click', e => e.stopPropagation());

/* ── 이미지 로드 ── */
gImg = new Image();
function loadImage(idx) {
  selectedImgIdx = idx;
  gImg.src = IMG_LIST[idx];
  document.getElementById('main-image').src = IMG_LIST[idx];
  document.getElementById('hint-img').src = IMG_LIST[idx];
}
loadImage(0);

document.querySelectorAll('input[name="img"]').forEach(el => {
  el.addEventListener('change', e => {
    if (e.target.checked) loadImage(parseInt(e.target.value));
  });
});

/* ── 직소 경로 ── */
function buildPieceDefs() {
  const hT=[], vT=[];
  for(let r=0;r<ROWS-1;r++){hT[r]=[];for(let c=0;c<COLS;c++)hT[r][c]=Math.random()<.5?1:-1;}
  for(let r=0;r<ROWS;r++){vT[r]=[];for(let c=0;c<COLS-1;c++)vT[r][c]=Math.random()<.5?1:-1;}
  const d=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) d.push({id:r*COLS+c,r,c,
    t:r===0?0:-hT[r-1][c], b:r===ROWS-1?0:hT[r][c],
    l:c===0?0:-vT[r][c-1], ri:c===COLS-1?0:vT[r][c]});
  return d;
}

function jigsawPath(ctx,def,W,H,T,PAD){
  const ox=PAD,oy=PAD;
  ctx.moveTo(ox,oy);
  drawEdge(ctx,ox,oy,ox+W,oy,def.t,T);
  drawEdge(ctx,ox+W,oy,ox+W,oy+H,def.ri,T);
  drawEdge(ctx,ox+W,oy+H,ox,oy+H,def.b,T);
  drawEdge(ctx,ox,oy+H,ox,oy,def.l,T);
  ctx.closePath();
}

function drawEdge(ctx,x1,y1,x2,y2,tab,T){
  if(tab===0){ctx.lineTo(x2,y2);return;}
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len,ny=dx/len,f=tab;
  const p=(t)=>({x:x1+dx*t,y:y1+dy*t});
  const n=(t,s)=>({x:x1+dx*t+nx*T*f*s,y:y1+dy*t+ny*T*f*s});
  ctx.lineTo(p(.2).x,p(.2).y);
  ctx.bezierCurveTo(p(.2).x,p(.2).y,n(.3,.5).x,n(.3,.5).y,n(.4,1).x,n(.4,1).y);
  ctx.bezierCurveTo(n(.4,1).x,n(.4,1).y,n(.5,1).x,n(.5,1).y,n(.6,1).x,n(.6,1).y);
  ctx.bezierCurveTo(n(.6,1).x,n(.6,1).y,n(.7,.5).x,n(.7,.5).y,p(.8).x,p(.8).y);
  ctx.lineTo(x2,y2);
}

function makePieceCanvas(def){
  const W=pw, H=ph, T=Math.min(W,H)*TAB, PAD=T+2;
  const cv=document.createElement('canvas');
  cv.width=W+PAD*2; cv.height=H+PAD*2;
  const ctx=cv.getContext('2d');

  // 핵심: 클리핑 후 이미지 전체를 캔버스 좌표에 맞게 스케일해서 그림
  // 이 조각(def.c, def.r)의 왼쪽 위 모서리가 캔버스의 (PAD, PAD) 위치에 오도록
  const scaleX = W / (gImg.naturalWidth / COLS);
  const scaleY = H / (gImg.naturalHeight / ROWS);
  const imgX = PAD - def.c * W;   // 이미지 전체의 x 시작점
  const imgY = PAD - def.r * H;   // 이미지 전체의 y 시작점

  ctx.save();
  ctx.beginPath();
  jigsawPath(ctx, def, W, H, T, PAD);
  ctx.clip();
  ctx.drawImage(gImg, imgX, imgY, gImg.naturalWidth * scaleX, gImg.naturalHeight * scaleY);
  ctx.restore();

  // 테두리
  ctx.beginPath();
  jigsawPath(ctx, def, W, H, T, PAD);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  return cv;
}

/* ── 게임 시작 ── */
function startGame(){
  if(!gImg.complete||!gImg.naturalWidth){alert('이미지 로딩 중...');return;}
  const gc = document.getElementById('grid-select').value.split(',').map(Number);
  COLS = gc[0]; ROWS = gc[1]; TOTAL = gc[2];
  moves=0; sel=null; cheatUsed=false;
  document.getElementById('s-move').textContent='0';
  document.getElementById('main-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('hint-wrap').style.display='none';
  document.getElementById('btn-hint').classList.remove('active');

  const scroll=document.getElementById('board-scroll');
  const availW=scroll.clientWidth-48, availH=scroll.clientHeight-48;
  pw=Math.floor(Math.min(availW/COLS, availH/ROWS));
  ph=Math.floor(pw*gImg.naturalHeight/gImg.naturalWidth);
  bw=pw*COLS; bh=ph*ROWS;

  const cv=document.getElementById('boardCv');
  cv.width=bw; cv.height=bh;

  pieces=buildPieceDefs(); shuffle(pieces);
  pieceCache={};
  pieces.forEach(p=>{ pieceCache[p.id]=makePieceCanvas(p); });
  board=Array.from({length:ROWS},()=>Array(COLS).fill(-1));

  renderBoard(); renderTray(); updateStats();
  clearInterval(ti); t0=Date.now();
  ti=setInterval(()=>document.getElementById('s-time').textContent=fmt(Math.floor((Date.now()-t0)/1000)),1000);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}

/* ── 보드 렌더 ── */
function renderBoard(){
  const cv=document.getElementById('boardCv');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,bw,bh);
  const T=Math.min(pw,ph)*TAB, PAD=T+2;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=c*pw,y=r*ph;
    // 빈 슬롯
    ctx.fillStyle=sel?'rgba(74,124,220,.06)':'rgba(0,0,0,.04)';
    ctx.fillRect(x+1,y+1,pw-2,ph-2);
    ctx.strokeStyle=sel?'rgba(74,124,220,.25)':'rgba(0,0,0,.1)';
    ctx.lineWidth=.8;
    ctx.setLineDash([3,3]); ctx.strokeRect(x+1.5,y+1.5,pw-3,ph-3); ctx.setLineDash([]);
  }
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const pid=board[r][c]; if(pid<0) continue;
    const pc=pieceCache[pid]; if(!pc) continue;
    ctx.drawImage(pc,c*pw-PAD,r*ph-PAD);
  }
}

/* ── 트레이 렌더 ── */
function renderTray(){
  const tray=document.getElementById('tray'); tray.innerHTML='';
  const placed=new Set();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]>=0) placed.add(board[r][c]);
  const rem=pieces.filter(p=>!placed.has(p.id));
  const sz=Math.floor((parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar'))-24)/3)-5;
  rem.forEach(p=>{
    const tc=document.createElement('canvas');
    const sc=sz/Math.max(pw,ph);
    const tw=pw*sc, th=ph*sc, tT=Math.min(tw,th)*TAB, tPAD=tT+2;
    tc.width=tw+tPAD*2; tc.height=th+tPAD*2; tc.className='tp';
    if(sel&&sel.id===p.id) tc.classList.add('sel');
    const ctx=tc.getContext('2d');
    const tScaleX = tw / (gImg.naturalWidth / COLS);
    const tScaleY = th / (gImg.naturalHeight / ROWS);
    const tImgX = tPAD - p.c * tw;
    const tImgY = tPAD - p.r * th;
    ctx.save(); ctx.beginPath(); jigsawPath(ctx,p,tw,th,tT,tPAD); ctx.clip();
    ctx.drawImage(gImg, tImgX, tImgY, gImg.naturalWidth*tScaleX, gImg.naturalHeight*tScaleY);
    ctx.restore();
    ctx.beginPath(); jigsawPath(ctx,p,tw,th,tT,tPAD);
    ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.lineWidth=.8; ctx.stroke();
    tc.addEventListener('click',()=>{sel=(sel&&sel.id===p.id)?null:p; renderBoard(); renderTray();});
    tray.appendChild(tc);
  });
  updateStats(rem.length);
}

function updateStats(remCount){
  const placed=remCount!==undefined?TOTAL-remCount:0;
  const pct=Math.round(placed/TOTAL*100);
  document.getElementById('s-rem').textContent=remCount!==undefined?remCount:TOTAL;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-text').textContent=pct+'%';
  document.getElementById('piece-count-badge').textContent=remCount!==undefined?remCount:TOTAL;
  document.getElementById('s-move').textContent=moves;
}

/* ── 보드 클릭 ── */
document.getElementById('boardCv').addEventListener('click',e=>{
  const rect=e.target.getBoundingClientRect();
  const bc=0|((e.clientX-rect.left)/pw), br=0|((e.clientY-rect.top)/ph);
  if(bc<0||bc>=COLS||br<0||br>=ROWS) return;
  if(!sel){
    if(board[br][bc]>=0){board[br][bc]=-1;moves++;renderBoard();renderTray();}
    return;
  }
  if(board[br][bc]>=0){const tmp=board[br][bc];board[br][bc]=sel.id;sel=pieces.find(p=>p.id===tmp);}
  else{board[br][bc]=sel.id;sel=null;}
  moves++;renderBoard();renderTray();check();
});

document.getElementById('boardCv').addEventListener('mousemove',e=>{
  const rect=e.target.getBoundingClientRect();
  const bc=0|((e.clientX-rect.left)/pw), br=0|((e.clientY-rect.top)/ph);
  e.target.style.cursor=(!sel&&bc>=0&&bc<COLS&&br>=0&&br<ROWS&&board[br][bc]>=0)?'grab':sel?'crosshair':'default';
});


/* ── 치트키 ── */
let cheatRunning = false;
let cheatUsed = false;
document.getElementById('btn-cheat').addEventListener('click', () => {
  if (cheatRunning) return;

  // 게임 중이 아니면 무시
  if (document.getElementById('app').style.display === 'none') return;

  cheatRunning = true;
  cheatUsed = true;
  const btn = document.getElementById('btn-cheat');
  btn.textContent = '⚡ 실행 중...';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';

  // 비어있는 슬롯에 넣어야 할 조각 목록 순서대로 수집
  // 순서: 좌→우, 위→아래 (row-major)
  const steps = [];
  for (let r = 0; r < ROWS; r++) {
    for (let col = 0; col < COLS; col++) {
      const correctId = r * COLS + col;
      if (board[r][col] !== correctId) {
        steps.push({ r, col, id: correctId });
      }
    }
  }

  let i = 0;
  function doStep() {
    if (i >= steps.length) {
      // 완성
      cheatRunning = false;
      btn.textContent = '⚡ 치트키';
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
      renderBoard(); renderTray();
      // 완성 체크
      setTimeout(check, 300);
      return;
    }

    const { r, col, id } = steps[i];

    // 혹시 이 id가 이미 다른 칸에 배치돼 있으면 제거
    for (let br = 0; br < ROWS; br++)
      for (let bc = 0; bc < COLS; bc++)
        if (board[br][bc] === id) board[br][bc] = -1;

    // 현재 칸에 있던 조각은 트레이로 (board에서 -1 처리)
    // (이미 위에서 처리됨 or 빈칸)
    board[r][col] = id;
    moves++;
    document.getElementById('s-move').textContent = moves;

    // 해당 조각만 하이라이트 애니메이션
    flashCell(col, r);

    renderBoard(); renderTray();
    i++;

    // 딜레이: 64조각 기준 적당히
    const delay = steps.length > 30 ? 60 : 100;
    setTimeout(doStep, delay);
  }

  doStep();
});

function flashCell(c, r) {
  const cv = document.getElementById('boardCv');
  const ctx = cv.getContext('2d');
  const T = Math.min(pw, ph) * TAB, PAD = T + 2;
  // 핑크 글로우 오버레이
  ctx.save();
  ctx.fillStyle = 'rgba(220,80,160,0.35)';
  ctx.fillRect(c * pw, r * ph, pw, ph);
  ctx.restore();
}

/* ── 완성 체크 ── */
function check(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const pid=board[r][c]; if(pid<0) return;
    const p=pieces.find(p=>p.id===pid);
    if(!p||p.r!==r||p.c!==c) return;
  }
  clearInterval(ti);
  const s=Math.floor((Date.now()-t0)/1000);
  document.getElementById('ov-moves').textContent=moves;
  document.getElementById('ov-time').textContent=fmt(s);
  // 치트키로 완성했으면 특별 멘트
  const wasCheat = cheatUsed;
  document.getElementById('overlay-title').textContent = wasCheat ? '🤖 깔깔깔!' : '🎉 완성!';
  document.getElementById('overlay-desc').textContent = wasCheat ? '치트키로 완성했군요... 깔깔깔 😂' : '퍼즐을 완성했어요!';
  setTimeout(()=>document.getElementById('overlay').classList.add('on'),400);
}

function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

/* ── 버튼들 ── */
document.getElementById('main-start').addEventListener('click',startGame);
document.getElementById('btn-new').addEventListener('click',startGame);
document.getElementById('btn-hint').addEventListener('click',()=>{
  const h=document.getElementById('hint-wrap');
  const btn=document.getElementById('btn-hint');
  const show=h.style.display==='none';
  h.style.display=show?'block':'none';
  btn.classList.toggle('active',show);
});
document.getElementById('ov-replay').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('on');startGame();});
document.getElementById('ov-menu').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('on');
  clearInterval(ti);sel=null;
  document.getElementById('app').style.display='none';
  document.getElementById('main-screen').style.display='flex';
});
</script>
